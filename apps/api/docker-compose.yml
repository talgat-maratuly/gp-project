services:
  postgres:
    image: postgres:16-alpine
    container_name: gp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gp
      POSTGRES_PASSWORD: gp_secret
      POSTGRES_DB: gp_service
    volumes:
      - gp_pg_data:/var/lib/postgresql/data

volumes:
  gp_pg_data:
