name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  ecosystem-health:
    name: Ecosystem health gate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://gp:gp@localhost:5432/gp?schema=public
      JWT_SECRET: ci-deploy-gate-secret-min-32-chars-long
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: node scripts/ecosystem-check.mjs

  build-and-push:
    name: Build and push images
    needs: ecosystem-health
    runs-on: ubuntu-latest
    env:
      PUBLIC_API_URL: ${{ secrets.VITE_API_URL != '' && secrets.VITE_API_URL || vars.VITE_API_URL }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: gp-api
            dockerfile: deploy/Dockerfile.api
            gp_app: ""
          - image_name: gp-service
            dockerfile: deploy/Dockerfile.frontend
            gp_app: service
          - image_name: gp-partner
            dockerfile: deploy/Dockerfile.frontend
            gp_app: partner
          - image_name: gp-admin
            dockerfile: deploy/Dockerfile.frontend
            gp_app: admin

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate build inputs
        shell: bash
        run: |
          if [ -z "${PUBLIC_API_URL}" ]; then
            echo "VITE_API_URL is not set. Add it as a repository Secret or Variable."
            exit 1
          fi
          if [ ! -f "deploy/nginx/spa.conf" ]; then
            echo "deploy/nginx/spa.conf is missing from the repository."
            exit 1
          fi

      - name: Compute image prefix
        id: image_vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          echo "image_prefix=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"

      # Optional: Docker Hub rate limits for node:* base images in Dockerfiles
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Runner-де docker buildx бар; жеке buildkit контейнерін registry-ден тартпаймыз
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image_vars.outputs.image_prefix }}/${{ matrix.image_name }}:prod-latest
            ${{ steps.image_vars.outputs.image_prefix }}/${{ matrix.image_name }}:sha-${{ github.sha }}
          build-args: |
            GP_APP=${{ matrix.gp_app }}
            VITE_API_URL=${{ env.PUBLIC_API_URL }}
            VITE_APP_NAME=${{ matrix.gp_app }}

  deploy:
    name: Deploy to server
    needs: [ecosystem-health, build-and-push]
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SERVER_HOST != '' && secrets.SERVER_HOST || vars.SERVER_HOST }}
      DEPLOY_USER: ${{ secrets.SERVER_USER != '' && secrets.SERVER_USER || vars.SERVER_USER }}
      CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ORIGINS != '' && secrets.CORS_ORIGINS || vars.CORS_ORIGINS }}
      WHATSAPP_SERVICE_URL: ${{ vars.WHATSAPP_SERVICE_URL != '' && vars.WHATSAPP_SERVICE_URL || 'https://wp.gpartners.kz/queues/push' }}
      WHATSAPP_SERVICE_TOKEN: ${{ secrets.WHATSAPP_SERVICE_TOKEN }}
      OTP_STORE_REVIEW_PHONE: ${{ vars.OTP_STORE_REVIEW_PHONE }}
      OTP_STORE_REVIEW_CODE: ${{ secrets.OTP_STORE_REVIEW_CODE }}
      OTP_DEV_BYPASS_ENABLED: ${{ vars.OTP_DEV_BYPASS_ENABLED }}
      OTP_DEV_BYPASS_CODE: ${{ vars.OTP_DEV_BYPASS_CODE }}
      DEPLOY_PATH: /opt/gp/gp-project/deploy
      POSTGRES_DB: gp
      POSTGRES_USER: gp
      GP_API_PORT: "4000"
      GP_SERVICE_PORT: "5173"
      GP_PARTNER_PORT: "5174"
      GP_ADMIN_PORT: "5175"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate deploy inputs
        shell: bash
        run: |
          if [ -z "${DEPLOY_HOST}" ]; then
            echo "SERVER_HOST is not set. Add it as a repository Secret or Variable."
            exit 1
          fi
          if [ -z "${DEPLOY_USER}" ]; then
            echo "SERVER_USER is not set. Add it as a repository Secret or Variable."
            exit 1
          fi
          if [ -z "${CORS_ALLOWED_ORIGINS}" ]; then
            echo "CORS_ORIGINS is not set. Add it as a repository Secret or Variable."
            exit 1
          fi
          if [ -z "${{ secrets.POSTGRES_PASSWORD }}" ]; then
            echo "POSTGRES_PASSWORD must be configured as a repository Secret."
            exit 1
          fi
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "JWT_SECRET must be configured as a repository Secret."
            exit 1
          fi
          if [ -z "${WHATSAPP_SERVICE_TOKEN}" ]; then
            echo "WHATSAPP_SERVICE_TOKEN must be configured as a repository Secret (mobile WhatsApp OTP)."
            exit 1
          fi

      - name: Compute image prefix
        id: image_vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          echo "image_prefix=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"

      - name: Prepare remote deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: mkdir -p "${{ env.DEPLOY_PATH }}"

      - name: Upload docker-compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: deploy/docker-compose.yml
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1

      - name: Pull and restart containers
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_PREFIX: ${{ steps.image_vars.outputs.image_prefix }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGINS: ${{ env.CORS_ALLOWED_ORIGINS }}
          WHATSAPP_SERVICE_URL: ${{ env.WHATSAPP_SERVICE_URL }}
          WHATSAPP_SERVICE_TOKEN: ${{ env.WHATSAPP_SERVICE_TOKEN }}
          OTP_STORE_REVIEW_PHONE: ${{ env.OTP_STORE_REVIEW_PHONE }}
          OTP_STORE_REVIEW_CODE: ${{ env.OTP_STORE_REVIEW_CODE }}
          OTP_DEV_BYPASS_ENABLED: ${{ env.OTP_DEV_BYPASS_ENABLED }}
          OTP_DEV_BYPASS_CODE: ${{ env.OTP_DEV_BYPASS_CODE }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN,IMAGE_PREFIX,POSTGRES_PASSWORD,JWT_SECRET,CORS_ORIGINS,WHATSAPP_SERVICE_URL,WHATSAPP_SERVICE_TOKEN,OTP_STORE_REVIEW_PHONE,OTP_STORE_REVIEW_CODE,OTP_DEV_BYPASS_ENABLED,OTP_DEV_BYPASS_CODE,DEPLOY_PATH,POSTGRES_DB,POSTGRES_USER,GP_API_PORT,GP_SERVICE_PORT,GP_PARTNER_PORT,GP_ADMIN_PORT
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            cat > "${DEPLOY_PATH}/.env" <<EOF
            GP_API_IMAGE=${IMAGE_PREFIX}/gp-api:prod-latest
            GP_SERVICE_IMAGE=${IMAGE_PREFIX}/gp-service:prod-latest
            GP_PARTNER_IMAGE=${IMAGE_PREFIX}/gp-partner:prod-latest
            GP_ADMIN_IMAGE=${IMAGE_PREFIX}/gp-admin:prod-latest
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            CORS_ORIGINS=${CORS_ORIGINS}
            WHATSAPP_SERVICE_URL=${WHATSAPP_SERVICE_URL}
            WHATSAPP_SERVICE_TOKEN=${WHATSAPP_SERVICE_TOKEN}
            OTP_STORE_REVIEW_PHONE=${OTP_STORE_REVIEW_PHONE}
            OTP_STORE_REVIEW_CODE=${OTP_STORE_REVIEW_CODE}
            OTP_DEV_BYPASS_ENABLED=${OTP_DEV_BYPASS_ENABLED}
            OTP_DEV_BYPASS_CODE=${OTP_DEV_BYPASS_CODE}
            GP_API_PORT=${GP_API_PORT}
            GP_SERVICE_PORT=${GP_SERVICE_PORT}
            GP_PARTNER_PORT=${GP_PARTNER_PORT}
            GP_ADMIN_PORT=${GP_ADMIN_PORT}
            EOF
            docker pull "${IMAGE_PREFIX}/gp-api:prod-latest"
            docker pull "${IMAGE_PREFIX}/gp-service:prod-latest"
            docker pull "${IMAGE_PREFIX}/gp-partner:prod-latest"
            docker pull "${IMAGE_PREFIX}/gp-admin:prod-latest"
            cd "${DEPLOY_PATH}"
            docker compose --env-file .env up -d --remove-orphans
            docker image prune -f
