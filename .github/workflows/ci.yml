name: CI — Ecosystem Stabilization

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ecosystem-health:
    name: Ecosystem health + builds
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://gp:gp_test@localhost:5432/gp_test?schema=public
      JWT_SECRET: ci-test-jwt-secret-min-32-characters-long
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gp
          POSTGRES_PASSWORD: gp_test
          POSTGRES_DB: gp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gp -d gp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ecosystem health check
        run: node scripts/ecosystem-check.mjs

      - name: Prisma migrate deploy (CI DB)
        run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma

      - name: Start API for flow smoke
        run: |
          npm run build:api
          node apps/api/dist/main.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health && break
            sleep 2
          done
          node scripts/ecosystem-check.mjs --flows

  docker-build-smoke:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: ecosystem-health
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: gp-api
            file: deploy/Dockerfile.api
            gp_app: ""
          - image: gp-service
            file: deploy/Dockerfile.frontend
            gp_app: service
          - image: gp-partner
            file: deploy/Dockerfile.frontend
            gp_app: partner
          - image: gp-admin
            file: deploy/Dockerfile.frontend
            gp_app: admin
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          build-args: |
            GP_APP=${{ matrix.gp_app }}
            VITE_API_URL=https://api.example.com/api
