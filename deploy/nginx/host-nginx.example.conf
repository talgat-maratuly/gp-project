# Host nginx (серверде) — Docker контейнерлер localhost порттарында
# /etc/nginx/sites-available/gp.conf → sites-enabled
#
# DuckDNS мысалы: apigp.duckdns.org → 127.0.0.1:4000
# CORS: apps/api/.env.production ішінде
# CORS_ORIGINS=https://admingp.duckdns.org,https://servicegp.duckdns.org,...

