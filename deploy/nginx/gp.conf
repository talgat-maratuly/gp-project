# GP production reverse proxy (nginx)
# Place static builds under /var/www/gp/{service,partner,admin,market}

upstream gp_api {
  server 127.0.0.1:4000;
  keepalive 32;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name api.gp-service.kz;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.gp-service.kz;

  # ssl_certificate /etc/letsencrypt/live/api.gp-service.kz/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/api.gp-service.kz/privkey.pem;

  location /health {
    proxy_pass http://gp_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /api/ {
    proxy_pass http://gp_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /tracking {
    proxy_pass http://gp_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
  }
}

server {
  listen 443 ssl http2;
  server_name gp-service.kz;

  root /var/www/gp/service;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 443 ssl http2;
  server_name partner.gp-service.kz;

  root /var/www/gp/partner;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 443 ssl http2;
  server_name admin.gp-service.kz;

  root /var/www/gp/admin;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 443 ssl http2;
  server_name market.gp-service.kz;

  root /var/www/gp/market;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
