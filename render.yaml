# Render Blueprint — GP API + PostgreSQL
# Dashboard → New → Blueprint → репозиторий talgat-maratuly/gp-project

databases:
  - name: gp-postgres
    plan: free
    databaseName: gp
    user: gp

services:
  - type: web
    name: gp-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >-
      NPM_CONFIG_PRODUCTION=false npm install &&
      npx prisma generate --schema apps/api/prisma/schema.prisma &&
      npm run build:api
    startCommand: >-
      npx prisma migrate deploy --schema apps/api/prisma/schema.prisma &&
      npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gp-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
